<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skip Trace Admin &middot; ForeclosureLeads Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; display: grid; place-items: center;
            background: #0f1117; color: #e5e7eb; font-family: 'Segoe UI', sans-serif;
        }
        main {
            width: min(440px, calc(100vw - 32px)); background: #16181f;
            border: 1px solid #2a2d3a; border-radius: 8px; padding: 26px;
        }
        h1 { font-size: 1.35rem; margin-bottom: 8px; color: #fff; }
        p { color: #9ca3af; line-height: 1.5; margin-bottom: 18px; }
        label { display: block; color: #9ca3af; font-size: 0.78rem; text-transform: uppercase; font-weight: 700; }
        input {
            width: 100%; margin-top: 6px; border: 1px solid #2a2d3a; border-radius: 6px;
            background: #0f1117; color: #fff; padding: 10px; font: inherit;
        }
        button {
            margin-top: 14px; border: 0; border-radius: 6px; padding: 10px 14px;
            background: #2563eb; color: #fff; font-weight: 800; cursor: pointer;
        }
        .warn { color: #facc15; }
    </style>
</head>
<body>
<main>
    <h1>Skip Trace Admin</h1>
    {% if token_configured %}
        <p>Enter the admin token to manage purchased lead contact info.</p>
        <form method="GET" action="{{ url_for('admin_skiptrace') }}">
            <label>Admin Token
                <input name="token" type="password" autocomplete="current-password" autofocus>
            </label>
            <button type="submit">Open Queue</button>
        </form>
    {% else %}
        <p class="warn">Set SKIPTRACE_ADMIN_TOKEN in Vercel before using this queue.</p>
    {% endif %}
</main>
</body>
</html>
