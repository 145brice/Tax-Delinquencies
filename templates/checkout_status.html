<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - ForeclosureLeads Pro</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; background: #0f1117; color: #e5e7eb;
            font-family: "Segoe UI", sans-serif;
        }
        nav {
            height: 56px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
            background: #16181f; border-bottom: 1px solid #2a2d3a;
        }
        .logo { color: #fff; text-decoration: none; font-size: 1.3rem; font-weight: 800; }
        .logo span { color: #3b82f6; }
        .wrap { min-height: calc(100vh - 56px); display: grid; place-items: center; padding: 24px; }
        main {
            width: min(620px, 100%); border: 1px solid #2a3148; border-radius: 10px;
            background: #16181f; padding: 32px; box-shadow: 0 24px 80px #0005;
        }
        .eyebrow { color: #93c5fd; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
        h1 { margin: 0 0 12px; font-size: 1.7rem; }
        p { margin: 0 0 24px; color: #9ca3af; line-height: 1.55; }
        a {
            color: #fff;
            background: #2563eb;
            border-radius: 6px;
            display: inline-block;
            padding: 10px 16px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <nav><a href="/" class="logo">Foreclosure<span>Leads</span> Pro</a></nav>
    <div class="wrap">
    <main>
        <div class="eyebrow">Account and checkout</div>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <a href="/">Back to storefront</a>
    </main>
    </div>
</body>
</html>
